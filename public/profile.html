<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Quiz Creator</title>
  <link rel="stylesheet" href="style.css?v=20260224d" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <header>
    <h1>Profile</h1>
    <nav id="nav">
      <a href="/">Home</a>
      <a href="/create.html">Create</a>
      <a id="nav-profile" href="/profile.html">Profile</a>
      <a href="/login.html">Login</a>
      <button id="theme-toggle">Toggle Theme</button>
    </nav>
  </header>
  <main>
    <section id="profile-page">
      <div class="profile-tabs">
        <button id="profile-tab-profile" type="button" class="active">Profile</button>
        <button id="profile-tab-settings" type="button">Settings</button>
      </div>

      <div id="profile-panel-main">
        <div id="profile-info">
          <img id="profile-avatar" src="default-avatar.png" alt="avatar" style="width:96px;height:96px;border-radius:8px" />
          <div>
            <h2 id="profile-username"></h2>
            <div>Roles: <span id="profile-roles">member</span></div>
            <div>Average score: <span id="profile-avg">0</span>%</div>
            <div>Quizzes taken: <span id="profile-count">0</span></div>
          </div>
        </div>

        <button id="admin-delete-user" type="button" class="danger-btn hidden">Delete Account</button>

        <form id="avatar-form" enctype="multipart/form-data">
          <label>Upload avatar</label>
          <input id="avatar-file" name="avatar" type="file" accept="image/*" />
          <button id="upload-avatar">Upload</button>
        </form>

        <h3>Quizzes</h3>
        <ul id="user-quizzes"></ul>

        <h3>Results</h3>
        <ul id="user-results"></ul>
      </div>

      <div id="profile-panel-settings" class="hidden">
        <h3>AI Generation Settings</h3>

        <label for="settings-ai-provider">AI Provider</label>
        <select id="settings-ai-provider">
          <option value="local">Local AI</option>
          <option value="openai">OpenAI</option>
        </select>

        <div id="settings-openai-wrap" class="hidden">
          <label for="settings-openai-model">OpenAI Model</label>
          <input id="settings-openai-model" type="text" placeholder="gpt-4.1-mini" />

          <label for="settings-openai-key">OpenAI API Key</label>
          <input id="settings-openai-key" type="password" placeholder="sk-..." autocomplete="off" />
        </div>

        <label for="settings-default-difficulty">Default Difficulty</label>
        <select id="settings-default-difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <label for="settings-default-count">Default Question Count (3-50)</label>
        <input id="settings-default-count" type="number" min="3" max="50" value="8" />

        <label class="editor-option">
          <input id="settings-review-prompts" type="checkbox" checked />
          Review each generated question/answer with prompts before applying
        </label>

        <button id="settings-save" type="button">Save Settings</button>
        <div id="settings-status" class="q-help"></div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js?v=20260224e"></script>
</body>
</html>
