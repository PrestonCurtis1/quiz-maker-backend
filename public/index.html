  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz Creator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <header>
    <h1>Quiz Maker</h1>
    <nav id="nav">
      <a href="/">Home</a>
      <a href="/create.html">Create</a>
      <a id="nav-profile" href="/profile.html">Profile</a>
      <a href="/login.html">Login</a>
      <button id="theme-toggle">Toggle Theme</button>
    </nav>
  </header>
  <main>
    <section id="list-section">
      <h2>Available Quizzes</h2>
      <div class="list-actions">
        <input id="search" placeholder="Search quizzes" />
        <select id="sort-by">
          <option value="score" selected>Sort: Score</option>
          <option value="averageRating">Sort: Rating</option>
          <option value="averageScore">Sort: Average Quiz Score</option>
          <option value="submissions">Sort: Submissions</option>
        </select>
        <select id="order-by">
          <option value="desc" selected>Order: High-Low</option>
          <option value="asc">Order: Low-High</option>
        </select>
        <select id="filter-user">
          <option value="all">User: All</option>
        </select>
        <select id="filter-difficulty">
          <option value="all">Difficulty: All</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <input id="filter-tags" placeholder="Filter tags (comma-separated)" />
        <button id="search-btn">Search</button>
      </div>
      <ul id="quiz-list"></ul>
      <div id="quiz-pagination" class="pagination-controls">
        <button id="quiz-prev-page" type="button">Previous</button>
        <span id="quiz-page-info" class="owner">Page 1 of 1</span>
        <button id="quiz-next-page" type="button">Next</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=20260225k"></script>
</body>
</html>
