<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Quiz — Quiz Creator</title>
  <link rel="stylesheet" href="style.css?v=20260224c" />
</head>
<body>
  <header>
    <h1>Create Quiz</h1>
    <nav id="nav">
      <a href="/">Home</a>
      <a href="/create.html">Create</a>
      <a id="nav-profile" href="/profile.html">Profile</a>
      <a href="/login.html">Login</a>
      <button id="theme-toggle">Toggle Theme</button>
    </nav>
  </header>
  <main>
    <section id="create-page">
      <div id="edit-indicator" class="hidden">Editing quiz <span id="editing-id"></span></div>
      <div class="ai-generator">
        <h3>Generate Draft with AI Questions</h3>
        <button id="ai-generate-btn" type="button">Generate Draft Quiz</button>
        <div class="q-help">Or generate from a study guide PDF:</div>
        <input id="ai-pdf-file" type="file" accept="application/pdf" />
        <button id="ai-generate-pdf-btn" type="button">Generate Draft from PDF</button>
        <div class="q-help">Or load draft from a JSON file:</div>
        <input id="json-quiz-file" type="file" accept="application/json,.json" />
        <button id="json-load-btn" type="button">Load Draft from JSON</button>
        <div id="ai-generate-status" class="q-help"></div>
      </div>
      <input id="quiz-title" placeholder="Quiz title" />
      <textarea id="quiz-description" placeholder="Quiz description (markdown)" rows="4"></textarea>
      <div class="editor-help">Use one card per question. You can reorder, duplicate, and remove questions. Enter options, then click the correct answer(s).</div>
      <label class="editor-option"><input id="show-question-results" type="checkbox" /> Show which questions were correct/incorrect after submit</label>
      <label class="editor-option"><input id="show-correct-answers" type="checkbox" /> Show correct answers for incorrect questions</label>
      <div id="questions"></div>
      <button id="add-question">Add Question</button>
      <button id="save-quiz">Save Quiz</button>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="ai.js?v=20260224e"></script>
  <script src="app.js?v=20260224e"></script>
</body>
</html>
