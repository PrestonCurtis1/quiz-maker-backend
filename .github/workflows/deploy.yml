name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
          script: |
            cd quiz-maker-backend/
            git pull
            npm install --production
            pm2 restart 0

      - name: Send Discord DMs
        if: always()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          USER_IDS: ${{ secrets.DISCORD_USER_ID }}
          STATUS: ${{ job.status }}
        run: |
          for USER_ID in $USER_IDS; do
            # 1. Create DM channel
            CHANNEL_DATA=$(curl -s -X POST https://discord.com/api/v10/users/@me/channels \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"recipient_id\": \"$USER_ID\"}")
            
            DM_CHANNEL_ID=$(echo $CHANNEL_DATA | jq -r '.id')
            CHANNEL_TYPE=$(echo $CHANNEL_DATA | jq -r '.type')

            # 2. Check if DM channel (type 1) was created
            if [ "$CHANNEL_TYPE" == "1" ]; then
              if [ "$STATUS" == "success" ]; then
                MSG="🚀 **Deployment Successful!** Quiz-Maker is live: https://your-quiz-maker-website.com"
              else
                MSG="❌ **Deployment Failed!** Check your GitHub Actions logs for details."
              fi
              
              curl -s -X POST https://discord.com/api/v10/channels/$DM_CHANNEL_ID/messages \
                -H "Authorization: Bot $DISCORD_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"content\": \"$MSG\"}"
            else
              echo "Error: Could not create DM channel for $USER_ID. API response: $CHANNEL_DATA"
            fi
          done
