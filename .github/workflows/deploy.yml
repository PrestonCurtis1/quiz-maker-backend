name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
          script: |
            cd quiz-maker-backend/
            git pull
            npm install --production
            pm2 restart 0

      - name: Send Discord DMs
        if: always()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          USER_IDS: ${{ secrets.DISCORD_USER_ID }}
        run: |
          for USER_ID in $USER_IDS; do
            echo "Attempting to send DM to User: $USER_ID"
            
            # 1. Create DM channel
            RESPONSE=$(curl -s -X POST https://discord.com/api/v10/users/@me/channels \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"recipient_id\": \"$USER_ID\"}")
            
            echo "API Response: $RESPONSE"
            
            # 2. Extract ID
            DM_CHANNEL_ID=$(echo $RESPONSE | jq -r '.id')
            echo "Extracted Channel ID: $DM_CHANNEL_ID"
            
            # 3. Send message directly to the ID
            curl -s -X POST https://discord.com/api/v10/channels/$DM_CHANNEL_ID/messages \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content": "Testing DM connectivity..."}'
          done
