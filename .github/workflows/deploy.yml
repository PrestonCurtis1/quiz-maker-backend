name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
          script: |
            cd quiz-maker-backend/
            git pull
            npm install --production
            pm2 restart 0

      # --- DISCORD DM NOTIFICATION STEP (Batch) ---
      - name: Send Discord DMs on Success
        if: success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          USER_IDS: ${{ secrets.DISCORD_USER_ID }} # Space-separated IDs
        run: |
          for USER_ID in $USER_IDS; do
            CHANNEL_ID=$(curl -s -X POST https://discord.com/api/v10/users/@me/channels \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"recipient_id\": \"$USER_ID\"}" | jq -r '.id')
            
            curl -s -X POST https://discord.com/api/v10/channels/$CHANNEL_ID/messages \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content": "🚀 **Deployment Successful!** Code is live on the server."}'
          done

      - name: Send Discord DMs on Failure
        if: failure()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          USER_IDS: ${{ secrets.DISCORD_USER_ID }}
        run: |
          for USER_ID in $USER_IDS; do
            CHANNEL_ID=$(curl -s -X POST https://discord.com/api/v10/users/@me/channels \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"recipient_id\": \"$USER_ID\"}" | jq -r '.id')
            
            curl -s -X POST https://discord.com/api/v10/channels/$CHANNEL_ID/messages \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content": "❌ **Deployment Failed!** Check your GitHub Actions logs for details."}'
          done
