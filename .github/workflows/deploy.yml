name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # This adds the "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
          script: |
            cd quiz-maker-backend/
            git pull
            npm install --production
            pm2 restart 0

      # --- DISCORD NOTIFICATION STEPS ---
      - name: Discord Success Notification
        if: success()
        uses: Ilshidur/action-discord@master
        with:
          args: '🚀 **Deployment Successful!** Code deployed to production.'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Discord Failure Notification
        if: failure()
        uses: Ilshidur/action-discord@master
        with:
          args: '❌ **Deployment Failed!** Check the GitHub Actions logs for details.'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
