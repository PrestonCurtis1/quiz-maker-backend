name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaced the broken SSH step with the webhook update request
      - name: Trigger Remote Server Update via Webhook
        run: |
          curl -X GET "https://quiz-maker.bendinghub.net/update-from-github?secret=${{ secrets.UPDATE_SECRET }}"

      - name: Send Discord Message
        if: always()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" == "success" ]; then
            MSG="🚀 **Deployment Successful!** Quiz-Maker is live."
          else
            MSG="❌ **Deployment Failed!** Check your GitHub Actions logs for details."
          fi
          
          curl -s -X POST https://discord.com/api/v10/channels/$CHANNEL_ID/messages \
            -H "Authorization: Bot $DISCORD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"

      - name: Send Discord DM to houdert6 cuz why not
        if: always()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.HOUDERT6_CHANNEL_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" == "success" ]; then
            MSG="🚀 **Deployment Successful!** Quiz-Maker is live."
          else
            MSG="❌ **Deployment Failed!** Check your GitHub Actions logs for details."
          fi
          
          curl -s -X POST https://discord.com/api/v10/channels/$CHANNEL_ID/messages \
            -H "Authorization: Bot $DISCORD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"
