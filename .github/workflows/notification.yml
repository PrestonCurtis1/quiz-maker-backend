name: Global Repository Monitor

on:
  push:
  pull_request:
  issues:
  issue_comment:
  commit_comment:
  watch:
  fork:
  release:
  discussion:
  discussion_comment:
  workflow_run:
  workflow_job:
  check_run:
  check_suite:
  create:
  delete:
  deployment:
  deployment_status:
  member:
  label:
  milestone:
  page_build:
  registry_package:
  repository_advisory:
  status:
  team_add:
  wiki:
  code_scanning_alert:
  dependabot_alert:
  secret_scanning_alert:
  pull_request_review:
  pull_request_review_comment:
  pull_request_review_thread:
  push_ruleset:
  repository_dispatch:
  schedule:
  gollum:
  project:
  project_card:
  project_column:
  public:
  repository:
  repository_import:
  repository_vulnerability_alert:
  security_advisory:
  star:
  sub_issue:
  workflow_call:
  workflow_dispatch:
  # The list above covers the vast majority of GitHub's event surface

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        env:
          TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          # Using jq to extract info safely from the GitHub context
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          
          # Prepare the payload
          PAYLOAD=$(jq -n \
            --arg title "Activity: $EVENT" \
            --arg desc "Triggered by $ACTOR" \
            '{embeds: [{title: $title, description: $desc, color: 3447003}]}')
          
          curl -X POST \
          -H "Authorization: Bot $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          https://discord.com/api/v10/channels/$CHANNEL_ID/messages
