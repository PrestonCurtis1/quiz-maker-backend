name: Global Repository Monitor

on:
  push:
  pull_request:
  issues:
    types: [opened, edited, closed]
  issue_comment:
    types: [created, edited]
  watch:
    types: [started]
  fork:
  release:
    types: [published]
  discussion:
  discussion_comment:
  workflow_run:
    workflows: ["*"]
    types: [requested, completed]
  create:
  delete:
  deployment:
  deployment_status:
  label:
    types: [created, edited, deleted]
  milestone:
    types: [created, opened, closed]
  status:
  gollum:
  project:
  public:
  workflow_dispatch:
  repository_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        env:
          TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          PAYLOAD=$(jq -n \
            --arg title "Activity: $EVENT" \
            --arg desc "Triggered by ${ACTOR:-Unknown}" \
            '{embeds: [{title: $title, description: $desc, color: 3447003}]}')
          
          curl -v --fail -X POST \
          -H "Authorization: Bot $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          https://discord.com/api/v10/channels/$CHANNEL_ID/messages
