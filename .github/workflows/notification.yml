name: Global Repository Monitor

on:
  push:
  pull_request:
  issues:
  issue_comment:
  commit_comment:
  watch:
  fork:
  release:
  discussion:
  discussion_comment:
  workflow_run:
    workflows: ["*"]
  workflow_job:
  check_run:
  check_suite:
  create:
  delete:
  deployment:
  deployment_status:
  member:
  label:
  milestone:
  page_build:
  registry_package:
  status:
  wiki:
  pull_request_review:
  pull_request_review_comment:
  repository_dispatch:
  schedule:
    - cron: '0 * * * *'
  gollum:
  project:
  public:
  repository:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        env:
          TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          
          # Prepare the payload
          PAYLOAD=$(jq -n \
            --arg title "Activity: $EVENT" \
            --arg desc "Triggered by $ACTOR in repository ${{ github.repository }}" \
            '{embeds: [{title: $title, description: $desc, color: 3447003}]}')
          
          curl -X POST \
          -H "Authorization: Bot $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          https://discord.com/api/v10/channels/$CHANNEL_ID/messages
